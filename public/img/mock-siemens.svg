<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="rgba(17,24,39,0.12)"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="#F3F4F6"/>
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="56" fill="#111827"/>
  <rect x="20" y="14" width="200" height="28" rx="8" fill="#E5E7EB"/>
  <rect x="1030" y="14" width="150" height="28" rx="8" fill="#374151"/>
  <!-- Sidebar -->
  <rect x="0" y="56" width="240" height="619" fill="#1F2937"/>
  <rect x="20" y="80" width="180" height="18" rx="6" fill="#9CA3AF"/>
  <rect x="20" y="114" width="200" height="14" rx="6" fill="#6B7280"/>
  <rect x="20" y="138" width="200" height="14" rx="6" fill="#6B7280"/>
  <rect x="20" y="162" width="200" height="14" rx="6" fill="#6B7280"/>
  <!-- Main panel -->
  <g transform="translate(260,80)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="920" height="240" rx="14" fill="#ffffff" stroke="#E5E7EB"/>
    </g>
    <!-- KPI cards -->
    <rect x="20" y="20" width="220" height="90" rx="12" fill="#F9FAFB" stroke="#E5E7EB"/>
    <rect x="260" y="20" width="220" height="90" rx="12" fill="#F9FAFB" stroke="#E5E7EB"/>
    <rect x="500" y="20" width="220" height="90" rx="12" fill="#F9FAFB" stroke="#E5E7EB"/>
    <rect x="740" y="20" width="160" height="36" rx="8" fill="#0B5FFF"/>
    <text x="760" y="44" font-family="Inter, system-ui" font-size="14" fill="#FFFFFF">Export Report</text>
    <rect x="36" y="36" width="160" height="14" rx="6" fill="#6B7280"/>
    <rect x="36" y="60" width="140" height="24" rx="8" fill="#93C5FD"/>
    <rect x="276" y="36" width="180" height="14" rx="6" fill="#6B7280"/>
    <rect x="276" y="60" width="140" height="24" rx="8" fill="#60A5FA"/>
    <rect x="516" y="36" width="160" height="14" rx="6" fill="#6B7280"/>
    <rect x="516" y="60" width="120" height="24" rx="8" fill="#3B82F6"/>

    <!-- Split panel -->
    <g filter="url(#shadow)" transform="translate(0,260)">
      <rect x="0" y="0" width="440" height="300" rx="14" fill="#ffffff" stroke="#E5E7EB"/>
      <rect x="20" y="16" width="240" height="16" rx="6" fill="#111827"/>
      <!-- Line chart -->
      <polyline points="40,240 80,220 120,230 160,180 200,210 240,170 280,190 320,150 360,180 400,140" stroke="#0B5FFF" stroke-width="3" fill="none"/>
      <rect x="20" y="48" width="400" height="2" fill="#E5E7EB"/>
    </g>
    <g filter="url(#shadow)" transform="translate(480,260)">
      <rect x="0" y="0" width="440" height="300" rx="14" fill="#ffffff" stroke="#E5E7EB"/>
      <rect x="20" y="16" width="200" height="16" rx="6" fill="#111827"/>
      <!-- Scan thumbnail placeholder -->
      <rect x="20" y="52" width="400" height="220" rx="12" fill="#111827" opacity="0.9"/>
      <rect x="40" y="72" width="360" height="180" rx="8" fill="#1F2937"/>
      <circle cx="220" cy="162" r="40" stroke="#0B5FFF" stroke-width="4" fill="none"/>
      <rect x="20" y="280" width="120" height="8" rx="4" fill="#9CA3AF"/>
    </g>
  </g>
</svg>
