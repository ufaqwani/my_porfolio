<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="rgba(17,24,39,0.12)"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="56" fill="#0B5FFF"/>
  <!-- Sidebar -->
  <rect x="0" y="56" width="240" height="619" fill="#111827"/>
  <rect x="20" y="80" width="160" height="18" rx="6" fill="#E5E7EB"/>
  <rect x="20" y="112" width="200" height="14" rx="6" fill="#6B7280"/>
  <rect x="20" y="136" width="200" height="14" rx="6" fill="#6B7280"/>
  <rect x="20" y="160" width="200" height="14" rx="6" fill="#6B7280"/>
  <!-- Content -->
  <g transform="translate(260,80)">
    <!-- KPI cards row -->
    <g filter="url(#shadow2)">
      <rect x="0" y="0" width="280" height="100" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <rect x="300" y="0" width="280" height="100" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <rect x="600" y="0" width="280" height="100" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
    </g>
    <rect x="20" y="16" width="160" height="14" rx="6" fill="#6B7280"/>
    <rect x="20" y="42" width="200" height="28" rx="8" fill="#93C5FD"/>
    <rect x="320" y="16" width="160" height="14" rx="6" fill="#6B7280"/>
    <rect x="320" y="42" width="160" height="28" rx="8" fill="#60A5FA"/>
    <rect x="620" y="16" width="180" height="14" rx="6" fill="#6B7280"/>
    <rect x="620" y="42" width="180" height="28" rx="8" fill="#3B82F6"/>

    <!-- Chart + checklist row -->
    <g filter="url(#shadow2)" transform="translate(0,120)">
      <rect x="0" y="0" width="580" height="320" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <rect x="20" y="16" width="260" height="16" rx="6" fill="#111827"/>
      <rect x="20" y="44" width="540" height="2" fill="#E5E7EB"/>
      <!-- Line chart -->
      <polyline points="40,280 80,240 120,260 160,220 200,240 240,200 280,220 320,180 360,210 400,170 440,200 500,160" stroke="#0B5FFF" stroke-width="3" fill="none"/>
    </g>
    <g filter="url(#shadow2)" transform="translate(600,120)">
      <rect x="0" y="0" width="280" height="320" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <rect x="20" y="16" width="200" height="16" rx="6" fill="#111827"/>
      <!-- Checklist -->
      <rect x="20" y="56" width="20" height="20" rx="4" fill="#10B981"/>
      <rect x="48" y="58" width="200" height="14" rx="6" fill="#6B7280"/>
      <rect x="20" y="92" width="20" height="20" rx="4" fill="#10B981"/>
      <rect x="48" y="94" width="220" height="14" rx="6" fill="#6B7280"/>
      <rect x="20" y="128" width="20" height="20" rx="4" fill="#10B981"/>
      <rect x="48" y="130" width="200" height="14" rx="6" fill="#6B7280"/>
    </g>

    <!-- Institutions tag -->
    <g filter="url(#shadow2)" transform="translate(0,460)">
      <rect x="0" y="0" width="160" height="36" rx="18" fill="#DBEAFE" stroke="#93C5FD"/>
      <text x="20" y="23" font-family="Inter, system-ui" font-size="14" fill="#111827">Institutions: 30+</text>
    </g>
  </g>
</svg>
