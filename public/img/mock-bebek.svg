<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="card" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(17,24,39,0.12)"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#0B5FFF"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="56" fill="#0B5FFF"/>
  <rect x="20" y="14" width="140" height="28" rx="8" fill="#FFFFFF" opacity="0.95"/>
  <rect x="980" y="14" width="200" height="28" rx="8" fill="#93C5FD"/>
  <!-- Sidebar -->
  <rect x="0" y="56" width="240" height="619" fill="#111827"/>
  <rect x="20" y="76" width="160" height="18" rx="6" fill="#E5E7EB" opacity="0.8"/>
  <rect x="20" y="112" width="200" height="14" rx="6" fill="#6B7280"/>
  <rect x="20" y="136" width="200" height="14" rx="6" fill="#6B7280"/>
  <rect x="20" y="160" width="200" height="14" rx="6" fill="#6B7280"/>
  <rect x="20" y="184" width="200" height="14" rx="6" fill="#6B7280"/>
  <!-- Content area -->
  <g transform="translate(260,76)">
    <!-- KPI cards -->
    <g filter="url(#card)">
      <rect x="0" y="0" width="260" height="92" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
      <rect x="280" y="0" width="260" height="92" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
      <rect x="560" y="0" width="260" height="92" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
    </g>
    <rect x="16" y="16" width="120" height="14" rx="6" fill="#6B7280"/>
    <rect x="16" y="40" width="180" height="28" rx="8" fill="#0B5FFF" opacity="0.9"/>
    <rect x="296" y="16" width="150" height="14" rx="6" fill="#6B7280"/>
    <rect x="296" y="40" width="200" height="28" rx="8" fill="#60A5FA"/>
    <rect x="576" y="16" width="140" height="14" rx="6" fill="#6B7280"/>
    <rect x="576" y="40" width="160" height="28" rx="8" fill="#93C5FD"/>

    <!-- Workflow diagram card -->
    <g filter="url(#card)" transform="translate(0,120)">
      <rect x="0" y="0" width="540" height="280" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <rect x="16" y="16" width="180" height="36" rx="8" fill="#0B5FFF"/>
      <text x="26" y="40" font-family="Inter, system-ui, Segoe UI, Roboto, Helvetica, Arial" font-size="16" fill="#FFFFFF">Run Workflow</text>
      <rect x="120" y="80" width="160" height="56" rx="10" fill="#F3F4F6" stroke="#E5E7EB"/>
      <rect x="320" y="80" width="140" height="56" rx="10" fill="#DBEAFE" stroke="#93C5FD"/>
      <rect x="120" y="168" width="160" height="56" rx="10" fill="#ECFDF5" stroke="#A7F3D0"/>
      <text x="136" y="114" font-family="Inter, system-ui" font-size="14" fill="#111827">HR Onboarding</text>
      <text x="340" y="114" font-family="Inter, system-ui" font-size="14" fill="#111827">AI Bot</text>
      <text x="156" y="202" font-family="Inter, system-ui" font-size="14" fill="#111827">Completed</text>
      <line x1="280" y1="108" x2="320" y2="108" stroke="#0B5FFF" stroke-width="3" marker-end="url(#arrow)"/>
      <line x1="200" y1="168" x2="200" y2="136" stroke="#0B5FFF" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="380" y="168" width="120" height="36" rx="8" fill="#111827"/>
      <text x="396" y="190" font-family="Inter, system-ui" font-size="14" fill="#FFFFFF">View Logs</text>
      <!-- Chat bubble -->
      <rect x="20" y="220" width="320" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
      <circle cx="40" cy="242" r="12" fill="#DBEAFE"/>
      <text x="60" y="247" font-family="Inter, system-ui" font-size="13" fill="#374151">AI Assistant: 42 tasks auto-completed today</text>
    </g>

    <!-- Bar chart card -->
    <g filter="url(#card)" transform="translate(560,120)">
      <rect x="0" y="0" width="520" height="280" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <rect x="16" y="16" width="240" height="16" rx="6" fill="#111827" opacity="0.9"/>
      <rect x="16" y="44" width="488" height="2" fill="#E5E7EB"/>
      <g transform="translate(32,64)">
        <rect x="0" y="60" width="32" height="120" fill="#93C5FD"/>
        <rect x="48" y="40" width="32" height="140" fill="#60A5FA"/>
        <rect x="96" y="20" width="32" height="160" fill="#3B82F6"/>
        <rect x="144" y="10" width="32" height="170" fill="#2563EB"/>
        <rect x="192" y="36" width="32" height="144" fill="#1D4ED8"/>
        <rect x="240" y="80" width="32" height="100" fill="#0B5FFF"/>
        <rect x="288" y="52" width="32" height="128" fill="#3B82F6"/>
        <rect x="336" y="30" width="32" height="150" fill="#60A5FA"/>
        <rect x="384" y="70" width="32" height="110" fill="#93C5FD"/>
      </g>
    </g>
  </g>
</svg>
